<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagamento Aprovado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  </head>
  <body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center py-10">
    
    <!-- Recibo Container -->
    <div id="recibo-container" class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden p-6 mb-6">
      
      <div class="text-center mb-6">
        <div class="mx-auto w-16 h-16 mb-4 bg-green-100 rounded-full flex items-center justify-center">
          <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800">Pagamento Aprovado</h1>
        <p class="text-sm text-gray-500 mt-1">Seu pedido já está sendo processado!</p>
      </div>
      
      <div class="border-t border-dashed border-gray-300 pt-4 mb-4">
        <div class="flex justify-between text-sm mb-2">
          <span class="text-gray-500">Transação MP:</span>
          <span id="transacao-id" class="font-medium text-gray-800">Processando...</span>
        </div>
        <div class="flex justify-between text-sm mb-2">
          <span class="text-gray-500">Pedido Nº:</span>
          <span id="pedido-id" class="font-medium text-gray-800">Processando...</span>
        </div>
        <div class="flex justify-between text-sm mb-2">
          <span class="text-gray-500">Data:</span>
          <span id="data-hora" class="font-medium text-gray-800"></span>
        </div>
      </div>

      <div class="border-t border-gray-200 pt-4 mb-4">
        <h3 class="text-sm font-bold text-gray-700 mb-3 uppercase">Resumo da Compra</h3>
        <ul id="lista-itens" class="space-y-2 mb-4">
          <!-- Itens injetados via JS -->
        </ul>
        <div class="flex justify-between items-center border-t border-gray-200 pt-3 mt-3">
          <span class="font-bold text-gray-800">Total Pago:</span>
          <span id="valor-total" class="text-xl font-bold text-green-600">R$ 0,00</span>
        </div>
      </div>
      
      <div class="bg-blue-50 text-blue-700 text-xs p-3 rounded-lg text-center font-medium mt-6">
        Um comprovante detalhado também foi enviado para o seu WhatsApp!
      </div>
    </div>

    <!-- Botões de Ação -->
    <div class="max-w-md w-full flex gap-3 no-print">
      <button onclick="baixarComprovante()" class="flex-1 bg-white border border-gray-300 text-gray-700 font-bold py-3 px-4 rounded-xl shadow-sm hover:bg-gray-50 transition flex items-center justify-center">
        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        Salvar Imagem
      </button>
      <a href="index.html" class="flex-1 bg-blue-600 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:bg-blue-700 transition text-center flex items-center justify-center">
        Voltar à Loja
      </a>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // 1. Extrair parâmetros da URL (Retorno do MP)
        const params = new URLSearchParams(window.location.search);
        const collectionId = params.get('collection_id') || params.get('payment_id');
        const externalRef = params.get('external_reference');
        
        document.getElementById('transacao-id').textContent = collectionId || 'N/A';
        document.getElementById('pedido-id').textContent = externalRef ? externalRef.substring(0, 8).toUpperCase() : 'N/A';
        
        const now = new Date();
        document.getElementById('data-hora').textContent = now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

        // 2. Recuperar carrinho do LocalStorage antes de limpar
        const carrinhoSalvo = localStorage.getItem('carrinho_pwa');
        if (carrinhoSalvo) {
          try {
            const carrinho = JSON.parse(carrinhoSalvo);
            const listaItens = document.getElementById('lista-itens');
            let total = 0;
            
            carrinho.forEach(item => {
              const subtotal = item.preco_unitario * item.quantidade;
              total += subtotal;
              
              const li = document.createElement('li');
              li.className = "flex justify-between text-sm";
              li.innerHTML = `
                <span class="text-gray-600 truncate mr-2 flex-1">${item.quantidade}x ${item.nome}</span>
                <span class="font-medium text-gray-900">R$ ${subtotal.toFixed(2).replace('.', ',')}</span>
              `;
              listaItens.appendChild(li);
            });
            
            document.getElementById('valor-total').textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
          } catch (e) {
            console.error('Erro ao ler carrinho:', e);
          }
        }

        // 3. Limpeza segura
        setTimeout(() => {
          localStorage.removeItem('mp_preference_id');
          localStorage.removeItem('mp_external_ref');
          localStorage.removeItem('carrinho_pwa');
        }, 1000);
      });

      // 4. Função de Download do Comprovante
      function baixarComprovante() {
        const container = document.getElementById('recibo-container');
        const originalStyle = container.style.cssText;
        container.style.borderRadius = "0px";
        container.style.boxShadow = "none";
        
        html2canvas(container, {
            scale: 2,
            backgroundColor: "#ffffff",
            logging: false
        }).then(canvas => {
            container.style.cssText = originalStyle;
            const link = document.createElement('a');
            const transacaoId = document.getElementById('transacao-id').textContent;
            link.download = `Comprovante_MP_${transacaoId}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }).catch(err => {
            container.style.cssText = originalStyle;
            console.error('Erro ao gerar imagem:', err);
            alert('Erro ao salvar imagem do comprovante.');
        });
      }
    </script>
  </body>
</html>
