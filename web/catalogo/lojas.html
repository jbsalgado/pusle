<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nossos Catálogos — Escolha sua Loja</title>
  <meta name="description" content="Encontre a loja ideal e explore nosso catálogo de produtos." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #0f172a 100%);
    }

    /* Estrelas de fundo animadas */
    .stars {
      position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation: twinkle var(--dur, 3s) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50%       { opacity: var(--op, 0.6); transform: scale(1); }
    }

    /* Cards glassmorphism */
    .loja-card {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 1.25rem;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .loja-card:hover {
      background: rgba(255, 255, 255, 0.11);
      border-color: rgba(139, 92, 246, 0.55);
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 64px rgba(139, 92, 246, 0.22), 0 0 0 1px rgba(139, 92, 246, 0.2);
    }

    /* Anel de avatar com gradiente */
    .avatar-ring {
      background: linear-gradient(135deg, #8b5cf6, #ec4899, #06b6d4);
      padding: 3px;
      border-radius: 50%;
    }
    .avatar-inner {
      background: #1e1b4b;
      border-radius: 50%;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Botão CTA */
    .btn-catalogo {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .btn-catalogo::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .btn-catalogo:hover::before { opacity: 1; }
    .btn-catalogo:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124, 58, 237, 0.5); }
    .btn-catalogo span { position: relative; z-index: 1; }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.06) 25%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 0.5rem;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Badge localização */
    .badge-local {
      background: rgba(99, 102, 241, 0.18);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #a5b4fc;
    }

    /* Campo de busca */
    .search-input {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      transition: all 0.2s ease;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.35); }
    .search-input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(139, 92, 246, 0.6);
      outline: none;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }

    /* Fade in dos cards */
    .card-appear {
      animation: cardIn 0.45s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body class="relative">

  <!-- Fundo estrelado -->
  <div class="stars" id="stars-bg"></div>

  <!-- Conteúdo principal -->
  <div class="relative z-10 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="pt-12 pb-8 px-6 text-center">
      <!-- Logo / ícone da plataforma -->
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-6"
           style="background: linear-gradient(135deg,#7c3aed,#4f46e5); box-shadow:0 8px 32px rgba(124,58,237,0.45)">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <h1 class="text-4xl md:text-5xl font-extrabold text-white tracking-tight mb-3">
        Nossos Catálogos
      </h1>
      <p class="text-lg text-indigo-300 max-w-md mx-auto leading-relaxed">
        Escolha uma loja e explore todos os produtos disponíveis
      </p>
    </header>

    <!-- Busca -->
    <div class="px-6 mb-8 max-w-md mx-auto w-full">
      <div class="relative">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 h-5 w-5 text-indigo-400 pointer-events-none"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input id="busca-lojas" type="search" placeholder="Buscar loja..."
               class="search-input w-full pl-11 pr-4 py-3 rounded-xl text-sm font-medium" />
      </div>
    </div>

    <!-- Grade de lojas -->
    <main class="flex-1 px-6 pb-16">
      <div id="grid-lojas"
           class="max-w-5xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Cards injetados via JS -->
      </div>

      <!-- Estado de loading (skeletons) -->
      <div id="skeletons"
           class="max-w-5xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="loja-card p-6 space-y-4">
          <div class="flex items-center gap-4">
            <div class="skeleton w-14 h-14 rounded-full flex-shrink-0"></div>
            <div class="flex-1 space-y-2">
              <div class="skeleton h-4 w-3/4"></div>
              <div class="skeleton h-3 w-1/2"></div>
            </div>
          </div>
          <div class="skeleton h-3 w-full"></div>
          <div class="skeleton h-10 w-full rounded-xl"></div>
        </div>
        <div class="loja-card p-6 space-y-4">
          <div class="flex items-center gap-4">
            <div class="skeleton w-14 h-14 rounded-full flex-shrink-0"></div>
            <div class="flex-1 space-y-2">
              <div class="skeleton h-4 w-2/3"></div>
              <div class="skeleton h-3 w-1/3"></div>
            </div>
          </div>
          <div class="skeleton h-3 w-5/6"></div>
          <div class="skeleton h-10 w-full rounded-xl"></div>
        </div>
        <div class="loja-card p-6 space-y-4 hidden lg:block">
          <div class="flex items-center gap-4">
            <div class="skeleton w-14 h-14 rounded-full flex-shrink-0"></div>
            <div class="flex-1 space-y-2">
              <div class="skeleton h-4 w-3/5"></div>
              <div class="skeleton h-3 w-2/5"></div>
            </div>
          </div>
          <div class="skeleton h-3 w-4/5"></div>
          <div class="skeleton h-10 w-full rounded-xl"></div>
        </div>
      </div>

      <!-- Nenhuma loja encontrada -->
      <div id="nenhuma-loja" class="hidden text-center py-20">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full mb-6"
             style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12)">
          <svg class="h-10 w-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-white mb-2">Nenhuma loja encontrada</h2>
        <p class="text-indigo-300">Tente buscar com outro termo.</p>
      </div>

      <!-- Erro ao carregar -->
      <div id="erro-carga" class="hidden text-center py-20">
        <div class="inline-flex items-center justify-center w-20 h-20 rounded-full mb-6"
             style="background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3)">
          <svg class="h-10 w-10 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-white mb-2">Não foi possível carregar as lojas</h2>
        <p class="text-indigo-300 mb-6">Verifique sua conexão e tente novamente.</p>
        <button onclick="carregarLojas()"
                class="btn-catalogo inline-flex items-center gap-2 px-6 py-2.5 rounded-xl text-white text-sm font-semibold">
          <span>↺ Tentar Novamente</span>
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="text-center pb-8">
      <p class="text-xs text-indigo-500">Powered by <span class="font-semibold text-indigo-400">Pulse</span></p>
    </footer>
  </div>

  <script>
    // ─── Fundo estrelado gerado dinamicamente ───────────────────────────────
    (function () {
      const bg = document.getElementById('stars-bg');
      for (let i = 0; i < 90; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `
          left:${Math.random()*100}%;top:${Math.random()*100}%;
          width:${size}px;height:${size}px;
          --dur:${(Math.random()*4+2).toFixed(1)}s;
          --op:${(Math.random()*0.5+0.2).toFixed(2)};
          animation-delay:${(Math.random()*5).toFixed(1)}s;
        `;
        bg.appendChild(s);
      }
    })();

    // ─── Detecta base da API a partir do pathname ───────────────────────────
    const detectApiBase = () => {
      // Localiza onde começa '/catalogo' no pathname
      const pathname = window.location.pathname;
      const idx = pathname.indexOf('/catalogo');
      // Tudo ANTES de '/catalogo' é o prefixo (ex: '' em localhost, '/pulse/web' em subpasta)
      const prefix = idx !== -1 ? pathname.substring(0, idx) : '';
      // Remove barra final e qualquer resquício de index.php no prefixo
      const base = prefix.replace(/\/index\.php.*$/, '').replace(/\/$/, '');
      return (base || '') + '/index.php';
    };
    const API_BASE = detectApiBase();
    const API_LOJAS = `${API_BASE}/api/usuario/lojas`;

    // ─── Estado global ──────────────────────────────────────────────────────
    let todasLojas = [];

    // ─── Ícones de placeholder por letra ───────────────────────────────────
    const GRADIENTES = [
      ['#7c3aed','#4f46e5'], ['#ec4899','#be185d'], ['#06b6d4','#0284c7'],
      ['#10b981','#047857'], ['#f59e0b','#d97706'], ['#ef4444','#b91c1c'],
    ];
    function gradienteParaLetra(letra) {
      const idx = (letra.charCodeAt(0) - 65) % GRADIENTES.length;
      return GRADIENTES[Math.max(0, idx)];
    }

    // ─── Renderiza um card de loja ──────────────────────────────────────────
    function renderCard(loja, delay = 0) {
      const primeiraLetra = (loja.nome_loja || '?')[0].toUpperCase();
      const [c1, c2] = gradienteParaLetra(primeiraLetra);

      const avatar = loja.logo_path
        ? `<img src="${loja.logo_path}" alt="${loja.nome_loja}"
                class="w-full h-full object-cover rounded-full"
                onerror="this.parentElement.innerHTML='<div class=\\'avatar-inner\\'><span class=\\'text-2xl font-bold text-white\\'>${primeiraLetra}</span></div>'">`
        : `<div class="avatar-inner"><span class="text-2xl font-bold text-white">${primeiraLetra}</span></div>`;

      const localizacao = [loja.cidade, loja.estado].filter(Boolean).join(' — ');
      const tel = loja.telefone
        ? `<div class="flex items-center gap-1.5 text-xs text-indigo-300">
             <svg class="h-3.5 w-3.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
               <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                     d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
             </svg>
             <span>${loja.telefone}</span>
           </div>` : '';

      const div = document.createElement('div');
      div.className = 'loja-card p-6 flex flex-col gap-5 card-appear';
      div.style.animationDelay = `${delay}ms`;
      div.dataset.nome = (loja.nome_loja || '').toLowerCase();
      div.innerHTML = `
        <!-- Cabeçalho do card -->
        <div class="flex items-center gap-4">
          <div class="avatar-ring flex-shrink-0 w-14 h-14" style="background:linear-gradient(135deg,${c1},${c2})">
            ${avatar}
          </div>
          <div class="min-w-0">
            <h2 class="text-base font-bold text-white leading-tight truncate">${loja.nome_loja || '—'}</h2>
            ${localizacao
              ? `<span class="badge-local inline-block mt-1 px-2 py-0.5 rounded-full text-xs font-medium">
                   📍 ${localizacao}
                 </span>`
              : '<span class="text-xs text-indigo-500 mt-1 block">Localização não informada</span>'}
          </div>
        </div>

        <!-- Detalhes -->
        <div class="space-y-2 flex-1">
          ${tel}
          <div class="flex items-center gap-1.5 text-xs text-indigo-400">
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
            </svg>
            <span class="font-mono opacity-70">${loja.slug}</span>
          </div>
        </div>

        <!-- CTA -->
        <a href="${loja.catalogo_url}"
           class="btn-catalogo flex items-center justify-center gap-2 w-full py-3 rounded-xl text-white text-sm font-semibold">
          <span>Ver Catálogo</span>
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </a>
      `;
      return div;
    }

    // ─── Renderiza todos os cards ───────────────────────────────────────────
    function renderizarLojas(lista) {
      const grid = document.getElementById('grid-lojas');
      const nenhuma = document.getElementById('nenhuma-loja');
      grid.innerHTML = '';

      if (lista.length === 0) {
        nenhuma.classList.remove('hidden');
        return;
      }
      nenhuma.classList.add('hidden');
      lista.forEach((loja, i) => grid.appendChild(renderCard(loja, i * 80)));
    }

    // ─── Busca em tempo real ────────────────────────────────────────────────
    document.getElementById('busca-lojas').addEventListener('input', function () {
      const termo = this.value.trim().toLowerCase();
      const filtradas = termo
        ? todasLojas.filter(l => (l.nome_loja || '').toLowerCase().includes(termo)
                               || (l.slug || '').toLowerCase().includes(termo)
                               || (l.cidade || '').toLowerCase().includes(termo))
        : todasLojas;
      renderizarLojas(filtradas);
    });

    // ─── Carrega lojas da API ───────────────────────────────────────────────
    async function carregarLojas() {
      const grid      = document.getElementById('grid-lojas');
      const skeletons = document.getElementById('skeletons');
      const erroCarga = document.getElementById('erro-carga');
      const nenhuma   = document.getElementById('nenhuma-loja');

      grid.innerHTML = '';
      skeletons.classList.remove('hidden');
      erroCarga.classList.add('hidden');
      nenhuma.classList.add('hidden');

      try {
        const resp = await fetch(API_LOJAS, { headers: { Accept: 'application/json' } });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const data = await resp.json();
        todasLojas = Array.isArray(data) ? data : (data.items || []);
        skeletons.classList.add('hidden');
        renderizarLojas(todasLojas);

      } catch (err) {
        console.error('[Vitrine] Erro ao carregar lojas:', err);
        skeletons.classList.add('hidden');
        erroCarga.classList.remove('hidden');
      }
    }

    // ─── Inicializa ─────────────────────────────────────────────────────────
    carregarLojas();
  </script>
</body>
</html>
