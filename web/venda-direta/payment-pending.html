<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pagamento Pendente</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden text-center p-8">

      <a href="index.html" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200">
        Continuar Operando
      </a>

    <script>
      localStorage.removeItem('mp_preference_id');
      localStorage.removeItem('mp_external_ref');
      localStorage.removeItem('mp_venda_direta');
      localStorage.removeItem('carrinho_pwa');
      localStorage.removeItem('carrinho_venda_direta');
    </script>
